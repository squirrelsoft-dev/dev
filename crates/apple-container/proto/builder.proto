syntax = "proto3";

package com.apple.container.build.v1;

service Builder {
  rpc CreateBuild(CreateBuildRequest) returns (CreateBuildResponse);
  rpc PerformBuild(stream ClientStream) returns (stream ServerStream);
  rpc Info(InfoRequest) returns (InfoResponse);
}

message InfoRequest {}
message InfoResponse {}

message CreateBuildRequest {
  string stage_name = 1;
  string tag = 2;
  map<string, string> metadata = 3;
  repeated string build_args = 4;
  bool debug = 5;
}

message CreateBuildResponse {
  string build_id = 1;
  map<string, string> metadata = 2;
}

message ClientStream {
  string build_id = 1;
  oneof packet_type {
    Signal signal = 2;
    Run command = 3;
    BuildTransfer build_transfer = 4;
    ImageTransfer image_transfer = 5;
  }
}

message Signal {
  int32 signal = 1;
}

message Run {
  string id = 1;
  string command = 2;
}

message RunComplete {
  string id = 1;
}

enum TransferDirection {
  INTO = 0;
  OUTOF = 1;
}

message BuildTransfer {
  string id = 1;
  TransferDirection direction = 2;
  optional string source = 3;
  optional string destination = 4;
  bytes data = 5;
  bool complete = 6;
  bool is_directory = 7;
  map<string, string> metadata = 8;
}

message ImageTransfer {
  string id = 1;
  TransferDirection direction = 2;
  string tag = 3;
  Descriptor descriptor = 4;
  bytes data = 5;
  bool complete = 6;
  map<string, string> metadata = 7;
}

message ServerStream {
  string build_id = 1;
  oneof packet_type {
    IO io = 2;
    BuildError build_error = 3;
    RunComplete command_complete = 4;
    BuildTransfer build_transfer = 5;
    ImageTransfer image_transfer = 6;
  }
}

enum Stdio {
  STDIN = 0;
  STDOUT = 1;
  STDERR = 2;
}

message IO {
  Stdio type = 1;
  bytes data = 2;
}

enum BuildErrorType {
  BUILD_FAILED = 0;
  INTERNAL = 1;
}

message BuildError {
  BuildErrorType type = 1;
  string message = 2;
}

message Platform {
  string architecture = 1;
  string os = 2;
  string os_version = 3;
  repeated string os_features = 4;
  string variant = 5;
}

message Descriptor {
  string media_type = 1;
  string digest = 2;
  int64 size = 3;
  repeated string urls = 4;
  map<string, string> annotations = 5;
  optional Platform platform = 6;
}
